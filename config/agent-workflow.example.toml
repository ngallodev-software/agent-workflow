[paths]
worktree_root = "~/.local/share/agent-workflow/worktrees"
state_root = "~/.local/state/agent-workflow"

[terminal]
backend = "tmux"
stall_minutes = 10
capture_lines = 50

[git]
branch_prefix = "impl/"
require_clean_source = true

[pack]
archive_level = 19
write_sha256 = true
validate_before_archive = true

[executors.codex]
command = ["codex", "exec", "--sandbox", "workspace-write", "--skip-git-repo-check", "-"]

[executors.claude]
command = ["claude", "--print"]
